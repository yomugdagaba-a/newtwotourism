name: north-wollo-tourism-backend
runtime: nodejs
buildCommand: cd backend-nodejs && npm install && npx prisma generate
startCommand: cd backend-nodejs && npm start
port: 3001
healthCheck: /health
envVars:
  - DATABASE_URL
  - DIRECT_URL
  - JWT_SECRET
  - JWT_EXPIRES_IN
  - JWT_REFRESH_EXPIRES_IN
  - NODE_ENV
  - PORT
  - FRONTEND_URL
  - GMAIL_USER
  - GMAIL_APP_PASSWORD
  - BCRYPT_ROUNDS
  - MAX_LOGIN_ATTEMPTS
  - LOCKOUT_DURATION
  - SESSION_TIMEOUT
