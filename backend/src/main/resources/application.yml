server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:northwollotourism.p12
    key-store-type: PKCS12
    key-store-password: changeit
    key-alias: northwollotourism

spring:
  application:
    name: north-wollo-tourism

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://localhost:5432/tourism
    username: postgres
    password: 123123Aa
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      continue-on-error: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: almetade912@gmail.com
    password: htplxvfembxwkefz
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:north-wollo-tourism-jwt-secret-key-2025-very-secure-strong-key-0123456789-extra-padding-for-512-bits}
    expiration: 86400000
    refresh-expiration: 604800000
    max-refresh-tokens-per-user: 5

  upload:
    dir: uploads

  password-reset:
    otp-expiry-minutes: 10
    max-attempts-per-otp: 3
    max-otps-per-user-per-hour: 3
    max-otps-per-ip-per-hour: 5
    cooldown-seconds: 60

  email-verification:
    otp-expiry-minutes: 15
    max-attempts-per-otp: 3
    max-otps-per-email-per-hour: 3
    max-otps-per-ip-per-hour: 5
    cooldown-seconds: 60
    required-for-login: false

  frontend:
    base-url: http://localhost:3000

  security:
    max-failed-attempts: 5
    lockout-duration-minutes: 15
    max-ip-attempts-per-hour: 100
    progressive-delay-enabled: true
    suspicious-activity-threshold: 3
    security-alerts-enabled: true

  audit:
    enabled: true
    log-authentication: true
    log-authorization: true
    log-data-changes: true
    log-security-events: true
    integrity-check-enabled: true
    cleanup-enabled: true
    retention-days: 90
    archive-batch-size: 1000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
